<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椿萱·颐 - AI陪伴设备模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .header p { font-size: 16px; opacity: 0.9; }

        .main-content { display: flex; min-height: 600px; }

        .left-panel { flex: 1; padding: 30px; border-right: 2px solid #f0f0f0; }

        .middle-panel {
            flex: 1;
            padding: 30px;
            border-right: 2px solid #f0f0f0;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            width: 380px;
            padding: 30px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: #2c3e50;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video { width: 100%; height: auto; display: none; border-radius: 15px; }
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .placeholder { color: white; text-align: center; padding: 40px; }
        .placeholder .icon { font-size: 80px; margin-bottom: 20px; opacity: 0.5; }

        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }

        button {
            flex: 1;
            min-width: 90px;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        #startBtn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        #stopBtn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        #voiceBtn { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.speaking { animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .voice-status {
            text-align: center;
            padding: 6px;
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 10px;
            min-height: 20px;
        }

        .status-panel {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
        }

        .status-panel h3 { color: #2c3e50; margin-bottom: 15px; font-size: 16px; }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .status-label { color: #7f8c8d; font-size: 14px; }
        .status-value { color: #2c3e50; font-weight: 600; font-size: 14px; }

        .emotion-bar { margin-top: 15px; }
        .emotion-item { display: flex; align-items: center; margin-bottom: 8px; }
        .emotion-label { width: 70px; font-size: 13px; color: #7f8c8d; }

        .emotion-progress {
            flex: 1;
            height: 16px;
            background: #dee2e6;
            border-radius: 8px;
            overflow: hidden;
            margin: 0 10px;
        }

        .emotion-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            border-radius: 8px;
        }

        .emotion-value {
            width: 45px;
            text-align: right;
            font-size: 13px;
            color: #2c3e50;
            font-weight: 600;
        }

        .chat-container { flex: 1; display: flex; flex-direction: column; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            max-height: 400px;
        }

        .message { margin-bottom: 15px; animation: fadeIn 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-user { text-align: right; }

        .message-user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: inline-block;
            padding: 10px 15px;
            border-radius: 18px 18px 5px 18px;
            max-width: 80%;
        }

        .message-ai .bubble {
            background: #f8f9fa;
            color: #2c3e50;
            display: inline-block;
            padding: 10px 15px;
            border-radius: 18px 18px 18px 5px;
            max-width: 80%;
        }

        .sender { font-size: 12px; color: #7f8c8d; margin-bottom: 5px; }

        .chat-input { display: flex; gap: 10px; }

        #messageInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus { border-color: #667eea; }

        #sendBtn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        #sendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .listening-indicator, .speaking-indicator {
            display: none;
            text-align: center;
            padding: 10px;
            font-weight: 600;
        }

        .listening-indicator { color: #667eea; }
        .speaking-indicator { color: #f093fb; }

        .listening-indicator.active,
        .speaking-indicator.active {
            display: block;
            animation: pulse 1.5s infinite;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .error.show { display: block; }

        .tab-header {
            display: flex;
            border-bottom: 2px solid #dee2e6;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #7f8c8d;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .tab-content.active { display: block; }

        .memory-section { margin-bottom: 20px; }
        .memory-section h4 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 14px;
            padding-bottom: 5px;
            border-bottom: 2px solid #667eea;
        }

        .memory-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #2c3e50;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .memory-item .label {
            color: #7f8c8d;
            font-size: 12px;
            margin-bottom: 3px;
        }

        .reminder-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 3px solid #667eea;
        }

        .reminder-item.health {
            border-left-color: #e74c3c;
        }

        .reminder-item .date {
            color: #667eea;
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 3px;
        }

        .reminder-item.health .date {
            color: #e74c3c;
        }

        .add-reminder { margin-top: 15px; }
        .add-reminder input {
            width: 100%;
            padding: 8px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 8px;
            outline: none;
        }

        .add-reminder input:focus { border-color: #667eea; }

        .add-reminder button {
            width: 100%;
            padding: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .emotion-chart {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .emotion-chart h5 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .emotion-bar-chart {
            display: flex;
            align-items: flex-end;
            height: 100px;
            gap: 5px;
        }

        .bar {
            flex: 1;
            background: linear-gradient(0deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px 3px 0 0;
            min-height: 5px;
            position: relative;
        }

        .bar-label {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #7f8c8d;
        }

        .interrupt-hint {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>椿萱·颐</h1>
            <p>AI陪伴设备模拟器</p>
        </div>

        <div class="main-content">
            <!-- 左侧：摄像头 -->
            <div class="left-panel">
                <div class="video-container" id="videoContainer">
                    <div class="placeholder" id="placeholder">
                        <div class="icon">📷</div>
                        <p>点击"开启摄像头"开始</p>
                    </div>
                    <video id="video" autoplay muted playsinline></video>
                    <canvas id="overlay"></canvas>
                </div>

                <div class="controls">
                    <button id="startBtn">📷 开启</button>
                    <button id="stopBtn" disabled>⏹️ 关闭</button>
                    <button id="voiceBtn">🎤 语音</button>
                </div>

                <div class="voice-status" id="voiceStatus"></div>

                <div class="status-panel">
                    <h3>实时检测</h3>
                    <div class="status-item">
                        <span class="status-label">人脸检测</span>
                        <span class="status-value" id="faceStatus">未检测</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">检测到人脸</span>
                        <span class="status-value" id="faceCount">0</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">主要情绪</span>
                        <span class="status-value" id="emotionStatus">-</span>
                    </div>

                    <div class="emotion-bar" id="emotionBar" style="display:none;">
                        <div class="emotion-item">
                            <span class="emotion-label">开心</span>
                            <div class="emotion-progress">
                                <div class="emotion-fill" id="happyBar" style="width:0%"></div>
                            </div>
                            <span class="emotion-value" id="happyValue">0%</span>
                        </div>
                        <div class="emotion-item">
                            <span class="emotion-label">悲伤</span>
                            <div class="emotion-progress">
                                <div class="emotion-fill" id="sadBar" style="width:0%"></div>
                            </div>
                            <span class="emotion-value" id="sadValue">0%</span>
                        </div>
                        <div class="emotion-item">
                            <span class="emotion-label">中性</span>
                            <div class="emotion-progress">
                                <div class="emotion-fill" id="neutralBar" style="width:0%"></div>
                            </div>
                            <span class="emotion-value" id="neutralValue">0%</span>
                        </div>
                    </div>
                </div>

                <div class="interrupt-hint">
                    语音打断：当「颐」正在说话时，点击语音按钮可打断并开始说话。
                </div>

                <div class="error" id="errorMsg"></div>
            </div>

            <!-- 中间：对话 -->
            <div class="middle-panel">
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message message-ai">
                            <div class="sender">颐</div>
                            <div class="bubble">爷爷/奶奶您好！我是颐，会记住咱们聊过的话，也会提醒您重要的事情。有什么我可以帮您的吗？</div>
                        </div>
                    </div>

                    <div class="speaking-indicator" id="speakingIndicator">
                        「颐」正在说话...（点击语音按钮可打断）
                    </div>

                    <div class="listening-indicator" id="listeningIndicator">
                        正在听您说话...
                    </div>

                    <div class="chat-input">
                        <input type="text" id="messageInput" placeholder="输入消息，或点击语音按钮..." />
                        <button id="sendBtn">发送</button>
                    </div>
                </div>
            </div>

            <!-- 右侧：记忆面板 -->
            <div class="right-panel">
                <div class="tab-header">
                    <button class="tab-btn active" data-tab="memory">记忆</button>
                    <button class="tab-btn" data-tab="reminder">提醒</button>
                    <button class="tab-btn" data-tab="emotion">情感</button>
                    <button class="tab-btn" data-tab="health">健康</button>
                </div>

                <div class="tab-content active" id="memoryTab">
                    <div class="memory-section">
                        <h4>记住的信息</h4>
                        <div id="memoriesList">
                            <div class="memory-item">
                                <div class="label">暂无记忆</div>
                                <div>开始对话后，我会记住重要信息</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="reminderTab">
                    <div class="memory-section">
                        <h4>提醒事项</h4>
                        <div id="remindersList">
                            <div class="reminder-item">
                                <div class="date">暂无提醒</div>
                                <div>点击下方添加提醒</div>
                            </div>
                        </div>

                        <div class="add-reminder">
                            <input type="text" id="reminderInput" placeholder="提醒内容..." />
                            <input type="date" id="reminderDate" />
                            <button onclick="addReminder()">添加提醒</button>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="emotionTab">
                    <div class="memory-section">
                        <h4>今日情绪曲线</h4>
                        <div id="emotionChart">
                            <div class="emotion-chart">
                                <p style="color:#7f8c8d; font-size:13px;">开始对话后，我会记录您的情绪变化</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="healthTab">
                    <div class="memory-section">
                        <h4>健康提醒</h4>
                        <div id="healthList">
                            <div class="reminder-item health">
                                <div class="date">暂无健康提醒</div>
                                <div>点击下方添加健康提醒</div>
                            </div>
                        </div>

                        <div class="add-reminder">
                            <input type="text" id="healthInput" placeholder="健康提醒内容..." />
                            <input type="date" id="healthDate" />
                            <button onclick="addHealthReminder()">添加健康提醒</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <script>
        // ============ DOM refs ============
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatMessages = document.getElementById('chatMessages');
        const listeningIndicator = document.getElementById('listeningIndicator');
        const speakingIndicator = document.getElementById('speakingIndicator');
        const placeholder = document.getElementById('placeholder');
        const voiceStatus = document.getElementById('voiceStatus');

        // ============ State ============
        let stream = null;
        let isRunning = false;
        let animationId = null;
        let isListening = false;
        let recognition = null;
        let isSpeaking = false;
        let modelsLoaded = false;
        let lastDetectTime = 0;
        const DETECT_INTERVAL = 300;

        // ============ Config ============
        let API_KEY = '';
        const API_URL = 'https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation';

        async function loadConfig() {
            try {
                const resp = await fetch('config.js');
                if (resp.ok) {
                    const text = await resp.text();
                    const match = text.match(/DASHSCOPE_API_KEY\s*=\s*['"]([^'"]+)['"]/);
                    if (match) { API_KEY = match[1]; return; }
                }
            } catch (e) {}
            API_KEY = localStorage.getItem('yi_api_key') || '';
            if (!API_KEY) {
                API_KEY = prompt('请输入通义千问 API Key（sk-开头）：', '') || '';
                if (API_KEY) localStorage.setItem('yi_api_key', API_KEY);
            }
        }

        // ============ Memory system ============
        let memories = [];
        let reminders = [];
        let healthReminders = [];
        let emotionRecords = [];
        let lastEmotionRecordTime = 0;

        function initMemory() {
            try {
                const s = k => { try { return localStorage.getItem(k); } catch(e) { return null; } };
                const m = s('yi_memories'); if (m) { memories = JSON.parse(m); updateMemoriesUI(); }
                const r = s('yi_reminders'); if (r) { reminders = JSON.parse(r); updateRemindersUI(); }
                const h = s('yi_health'); if (h) { healthReminders = JSON.parse(h); updateHealthUI(); }
                const e = s('yi_emotions'); if (e) { emotionRecords = JSON.parse(e); updateEmotionChart(); }
            } catch (e) { console.warn('Failed to load memory:', e); }
        }

        function saveMemories() { localStorage.setItem('yi_memories', JSON.stringify(memories)); }
        function saveReminders() { localStorage.setItem('yi_reminders', JSON.stringify(reminders)); }
        function saveHealth() { localStorage.setItem('yi_health', JSON.stringify(healthReminders)); }
        function saveEmotions() { localStorage.setItem('yi_emotions', JSON.stringify(emotionRecords)); }

        function addMemory(content, type) {
            type = type || 'conversation';
            memories.push({ id: Date.now(), content: content, type: type, timestamp: new Date().toISOString() });
            if (memories.length > 50) memories = memories.slice(-50);
            saveMemories();
            updateMemoriesUI();
        }

        function addEmotionRecord(emotion, value) {
            var now = Date.now();
            if (now - lastEmotionRecordTime < 30000) return;
            emotionRecords.push({
                id: now,
                date: new Date().toISOString().split('T')[0],
                time: new Date().toTimeString().split(' ')[0],
                emotion: emotion, value: value
            });
            lastEmotionRecordTime = now;
            if (emotionRecords.length > 200) emotionRecords = emotionRecords.slice(-200);
            saveEmotions();
            updateEmotionChart();
        }

        function addReminder() {
            var content = document.getElementById('reminderInput').value.trim();
            var date = document.getElementById('reminderDate').value;
            if (!content || !date) { alert('请填写提醒内容和日期'); return; }
            reminders.push({ id: Date.now(), content: content, date: date, completed: false });
            saveReminders(); updateRemindersUI();
            document.getElementById('reminderInput').value = '';
            document.getElementById('reminderDate').value = '';
        }

        function addHealthReminder() {
            var content = document.getElementById('healthInput').value.trim();
            var date = document.getElementById('healthDate').value;
            if (!content || !date) { alert('请填写健康提醒内容和日期'); return; }
            healthReminders.push({ id: Date.now(), content: content, date: date, completed: false });
            saveHealth(); updateHealthUI();
            document.getElementById('healthInput').value = '';
            document.getElementById('healthDate').value = '';
        }

        function updateMemoriesUI() {
            var list = document.getElementById('memoriesList');
            if (memories.length === 0) {
                list.innerHTML = '<div class="memory-item"><div class="label">暂无记忆</div><div>开始对话后，我会记住重要信息</div></div>';
                return;
            }
            list.innerHTML = memories.slice(-15).map(function(m) {
                return '<div class="memory-item"><div class="label">' + m.type + ' - ' + new Date(m.timestamp).toLocaleDateString('zh-CN') + '</div><div>' + m.content + '</div></div>';
            }).join('');
        }

        function updateRemindersUI() {
            var list = document.getElementById('remindersList');
            if (reminders.length === 0) {
                list.innerHTML = '<div class="reminder-item"><div class="date">暂无提醒</div><div>点击下方添加提醒</div></div>';
                return;
            }
            list.innerHTML = reminders.map(function(r) {
                return '<div class="reminder-item"><div class="date">' + r.date + '</div><div>' + r.content + '</div></div>';
            }).join('');
        }

        function updateHealthUI() {
            var list = document.getElementById('healthList');
            if (healthReminders.length === 0) {
                list.innerHTML = '<div class="reminder-item health"><div class="date">暂无健康提醒</div><div>点击下方添加健康提醒</div></div>';
                return;
            }
            list.innerHTML = healthReminders.map(function(r) {
                return '<div class="reminder-item health"><div class="date">' + r.date + '</div><div>' + r.content + '</div></div>';
            }).join('');
        }

        function updateEmotionChart() {
            var container = document.getElementById('emotionChart');
            var today = new Date().toISOString().split('T')[0];
            var todayRecords = emotionRecords.filter(function(r) { return r.date === today; });
            if (todayRecords.length === 0) {
                container.innerHTML = '<div class="emotion-chart"><p style="color:#7f8c8d; font-size:13px;">开始对话后，我会记录您的情绪变化</p></div>';
                return;
            }
            var emotionCounts = { happy: 0, sad: 0, neutral: 0, angry: 0, fearful: 0, surprised: 0 };
            todayRecords.forEach(function(r) { emotionCounts[r.emotion] = (emotionCounts[r.emotion] || 0) + 1; });
            var maxCount = Math.max.apply(null, Object.values(emotionCounts).concat([1]));
            var emojiMap = { happy: '😊', sad: '😢', angry: '😠', fearful: '😨', surprised: '😲', neutral: '😐' };
            var barsHtml = Object.entries(emotionCounts).map(function(e) {
                return '<div class="bar" style="height: ' + (e[1] / maxCount * 100) + '%"><span class="bar-label">' + emojiMap[e[0]] + '</span></div>';
            }).join('');
            var countsHtml = Object.entries(emotionCounts).map(function(e) {
                return '<div style="text-align:center;"><div>' + emojiMap[e[0]] + '</div><div>' + e[1] + '次</div></div>';
            }).join('');
            container.innerHTML = '<div class="emotion-chart"><h5>今日情绪分布</h5><div class="emotion-bar-chart">' + barsHtml + '</div><div style="display:flex; justify-content:space-around; margin-top:20px; font-size:11px; color:#7f8c8d;">' + countsHtml + '</div></div>';
        }

        function checkReminders() {
            var today = new Date().toISOString().split('T')[0];
            reminders.concat(healthReminders).forEach(function(r) {
                if (!r.completed && r.date === today) {
                    addMessage('提醒：今天 ' + r.content, 'ai');
                    r.completed = true;
                }
            });
            saveReminders(); saveHealth(); updateRemindersUI(); updateHealthUI();
        }

        // ============ Tab switching ============
        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
            });
        });

        // ============ Face detection ============
        async function loadFaceAPIModels() {
            if (modelsLoaded) return true;
            try {
                var MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
                ]);
                modelsLoaded = true;
                console.log('Face API models loaded');
                return true;
            } catch (err) {
                console.error('Failed to load Face API models:', err);
                showError('无法加载人脸检测模型，请检查网络连接');
                return false;
            }
        }

        startBtn.addEventListener('click', async function() {
            startBtn.disabled = true;
            startBtn.textContent = '加载中...';

            var ok = await loadFaceAPIModels();
            if (!ok) {
                startBtn.disabled = false;
                startBtn.textContent = '📷 开启';
                return;
            }

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
                    audio: false
                });
                video.srcObject = stream;
                video.style.display = 'block';
                placeholder.style.display = 'none';

                video.addEventListener('loadedmetadata', function() {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    stopBtn.disabled = false;
                    isRunning = true;
                    detectLoop();
                }, { once: true });

            } catch (err) {
                showError('无法访问摄像头: ' + err.message);
                startBtn.disabled = false;
                startBtn.textContent = '📷 开启';
            }
        });

        stopBtn.addEventListener('click', function() {
            isRunning = false;
            if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
            if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
            video.style.display = 'none';
            placeholder.style.display = 'block';
            startBtn.disabled = false;
            startBtn.textContent = '📷 开启';
            stopBtn.disabled = true;
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            document.getElementById('faceStatus').textContent = '未检测';
            document.getElementById('faceStatus').style.color = '#7f8c8d';
            document.getElementById('faceCount').textContent = '0';
            document.getElementById('emotionStatus').textContent = '-';
            document.getElementById('emotionBar').style.display = 'none';
        });

        async function detectLoop() {
            if (!isRunning) return;

            var now = performance.now();
            if (now - lastDetectTime >= DETECT_INTERVAL) {
                lastDetectTime = now;
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                try {
                    var detections = await faceapi
                        .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.4 }))
                        .withFaceLandmarks()
                        .withFaceExpressions();

                    if (detections && detections.length > 0) {
                        var resized = faceapi.resizeResults(detections, {
                            width: overlay.width, height: overlay.height
                        });
                        faceapi.draw.drawDetections(ctx, resized);
                        faceapi.draw.drawFaceLandmarks(ctx, resized);

                        document.getElementById('faceStatus').textContent = '已检测';
                        document.getElementById('faceStatus').style.color = '#27ae60';
                        document.getElementById('faceCount').textContent = detections.length;

                        var expressions = detections[0].expressions;
                        updateEmotionUI(expressions);

                        var maxEmotion = 'neutral', maxValue = 0;
                        for (var key in expressions) {
                            if (expressions[key] > maxValue) { maxValue = expressions[key]; maxEmotion = key; }
                        }
                        addEmotionRecord(maxEmotion, maxValue);
                    } else {
                        document.getElementById('faceStatus').textContent = '未检测到';
                        document.getElementById('faceStatus').style.color = '#e74c3c';
                        document.getElementById('faceCount').textContent = '0';
                        document.getElementById('emotionStatus').textContent = '-';
                        document.getElementById('emotionBar').style.display = 'none';
                    }
                } catch (err) {
                    console.warn('Face detection frame error:', err);
                }
            }

            animationId = requestAnimationFrame(detectLoop);
        }

        function updateEmotionUI(expressions) {
            var emotionMap = {
                happy: '😊 开心', sad: '😢 悲伤', angry: '😠 愤怒',
                fearful: '😨 恐惧', surprised: '😲 惊讶', neutral: '😐 中性', disgusted: '🤢 厌恶'
            };
            var maxEmotion = 'neutral', maxValue = 0;
            for (var key in expressions) {
                if (expressions[key] > maxValue) { maxValue = expressions[key]; maxEmotion = key; }
            }
            document.getElementById('emotionStatus').textContent = emotionMap[maxEmotion] || maxEmotion;
            document.getElementById('emotionBar').style.display = 'block';
            document.getElementById('happyBar').style.width = (expressions.happy * 100).toFixed(1) + '%';
            document.getElementById('happyValue').textContent = (expressions.happy * 100).toFixed(1) + '%';
            document.getElementById('sadBar').style.width = (expressions.sad * 100).toFixed(1) + '%';
            document.getElementById('sadValue').textContent = (expressions.sad * 100).toFixed(1) + '%';
            document.getElementById('neutralBar').style.width = (expressions.neutral * 100).toFixed(1) + '%';
            document.getElementById('neutralValue').textContent = (expressions.neutral * 100).toFixed(1) + '%';
        }

        // ============ Voice recognition ============
        voiceBtn.addEventListener('click', function() {
            if (isSpeaking) {
                interruptSpeech();
            } else if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        });

        function interruptSpeech() {
            speechSynthesis.cancel();
            isSpeaking = false;
            speakingIndicator.classList.remove('active');
            voiceBtn.textContent = '🎤 语音';
            voiceBtn.classList.remove('speaking');
            voiceStatus.textContent = '已打断，开始听您说话...';
            startListening();
        }

        function startListening() {
            var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showError('您的浏览器不支持语音识别，请使用Chrome浏览器');
                return;
            }

            if (recognition) {
                try { recognition.abort(); } catch (e) {}
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                isListening = true;
                voiceBtn.textContent = '⏹️ 停止';
                voiceBtn.classList.remove('speaking');
                listeningIndicator.classList.add('active');
                voiceStatus.textContent = '正在听您说话...';
            };

            recognition.onresult = function(event) {
                var text = event.results[0][0].transcript;
                if (text && text.trim()) {
                    messageInput.value = text;
                    voiceStatus.textContent = '识别到: "' + text + '"';
                    sendMessage();
                } else {
                    voiceStatus.textContent = '未识别到内容，请重试';
                }
            };

            recognition.onerror = function(event) {
                console.warn('Speech recognition error:', event.error);
                if (event.error === 'no-speech') {
                    voiceStatus.textContent = '未检测到语音，请重试';
                } else if (event.error === 'not-allowed') {
                    showError('麦克风权限被拒绝，请在浏览器设置中允许');
                } else {
                    voiceStatus.textContent = '语音识别出错: ' + event.error;
                }
                stopListening();
            };

            recognition.onend = function() {
                isListening = false;
                voiceBtn.textContent = '🎤 语音';
                listeningIndicator.classList.remove('active');
            };

            try {
                recognition.start();
            } catch (e) {
                console.warn('Failed to start recognition:', e);
                voiceStatus.textContent = '启动语音识别失败，请重试';
            }
        }

        function stopListening() {
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
            }
            isListening = false;
            voiceBtn.textContent = '🎤 语音';
            listeningIndicator.classList.remove('active');
        }

        // ============ Chat ============
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });

        async function sendMessage() {
            var text = messageInput.value.trim();
            if (!text) return;
            messageInput.value = '';
            addMessage(text, 'user');
            addMessage('正在思考...', 'ai', true);

            try {
                var response = await callQwenAPI(text);
                removeTempMessage();
                addMessage(response, 'ai');
                speak(response);
                addMemory('用户说: ' + text, 'conversation');
                addMemory('颐回复: ' + response, 'conversation');
            } catch (err) {
                removeTempMessage();
                addMessage('抱歉，我有点累了，稍后再试试吧。', 'ai');
                console.error('API error:', err);
            }
        }

        async function callQwenAPI(userInput) {
            if (!API_KEY) throw new Error('API Key 未配置');

            var memoryContext = '';
            if (memories.length > 0) {
                memoryContext = '\n\n【已记住的信息】：\n' + memories.slice(-10).map(function(m) { return '- ' + m.content; }).join('\n');
            }

            var prompt = '你是「颐」，一个专门为独居老人设计的AI陪伴助手。\n\n【角色限定】：\n1. 身份：温暖、耐心的AI陪伴者，像子女一样关心老人\n2. 称呼：对男性用「爷爷」，对女性用「奶奶」，通用「您」\n3. 语言风格：句子要短，避免复杂句式；不要用网络用语；语气温暖有同理心；回复在50字以内\n4. 行为准则：主动关心老人的身体、情绪、饮食；记住老人说过的话；在合适的时候主动提起过去的话题；如果发现老人情绪异常要特别关注' + memoryContext + '\n\n【当前对话】：\n老人说：「' + userInput + '」\n\n请回复：';

            var payload = {
                model: 'qwen-turbo',
                input: { prompt: prompt },
                parameters: { max_tokens: 200, temperature: 0.7 }
            };

            var response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error('API request failed: ' + response.status);
            }

            var data = await response.json();
            if (data.output && data.output.text) {
                return data.output.text;
            }
            throw new Error(data.message || 'API调用失败');
        }

        // ============ TTS (improved) ============
        var preferredVoice = null;

        function findBestChineseVoice() {
            var voices = speechSynthesis.getVoices();
            var priorities = [
                function(v) { return v.name.includes('Google') && v.lang.startsWith('zh'); },
                function(v) { return v.name.includes('Microsoft') && v.lang.startsWith('zh') && v.name.includes('Female'); },
                function(v) { return v.lang.startsWith('zh') && (v.name.includes('女') || v.name.includes('Female') || v.name.includes('Xiaoxiao')); },
                function(v) { return v.lang.startsWith('zh-CN'); },
                function(v) { return v.lang.startsWith('zh'); },
            ];
            for (var i = 0; i < priorities.length; i++) {
                var found = voices.find(priorities[i]);
                if (found) return found;
            }
            return voices.find(function(v) { return v.lang.startsWith('zh'); }) || null;
        }

        if ('speechSynthesis' in window) {
            speechSynthesis.onvoiceschanged = function() {
                preferredVoice = findBestChineseVoice();
                console.log('Selected TTS voice:', preferredVoice ? preferredVoice.name : 'default');
            };
            preferredVoice = findBestChineseVoice();
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) return;

            speechSynthesis.cancel();

            var sentences = text.match(/[^。！？；\n]+[。！？；\n]?/g) || [text];
            var index = 0;

            function speakNext() {
                if (index >= sentences.length) {
                    isSpeaking = false;
                    speakingIndicator.classList.remove('active');
                    voiceBtn.textContent = '🎤 语音';
                    voiceBtn.classList.remove('speaking');
                    voiceStatus.textContent = '';
                    return;
                }

                var sentence = sentences[index].trim();
                if (!sentence) { index++; speakNext(); return; }

                var utterance = new SpeechSynthesisUtterance(sentence);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.88;
                utterance.pitch = 1.1;

                if (preferredVoice) {
                    utterance.voice = preferredVoice;
                }

                utterance.onend = function() {
                    index++;
                    if (index < sentences.length) {
                        setTimeout(speakNext, 150);
                    } else {
                        isSpeaking = false;
                        speakingIndicator.classList.remove('active');
                        voiceBtn.textContent = '🎤 语音';
                        voiceBtn.classList.remove('speaking');
                        voiceStatus.textContent = '';
                    }
                };

                utterance.onerror = function() {
                    isSpeaking = false;
                    speakingIndicator.classList.remove('active');
                    voiceBtn.textContent = '🎤 语音';
                    voiceBtn.classList.remove('speaking');
                };

                speechSynthesis.speak(utterance);
            }

            isSpeaking = true;
            speakingIndicator.classList.add('active');
            voiceBtn.textContent = '🎤 打断';
            voiceBtn.classList.add('speaking');
            voiceStatus.textContent = '颐正在说话...';
            speakNext();
        }

        // ============ Message UI ============
        function addMessage(text, sender, isTemp) {
            var div = document.createElement('div');
            div.className = 'message message-' + sender;
            var name = sender === 'user' ? '您' : '颐';
            div.innerHTML = '<div class="sender">' + name + '</div><div class="bubble">' + escapeHtml(text) + '</div>';
            if (isTemp) div.id = 'tempMessage';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTempMessage() {
            var el = document.getElementById('tempMessage');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(msg) {
            var el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 5000);
        }

        // ============ Init ============
        window.addEventListener('load', async function() {
            await loadConfig();
            initMemory();
            checkReminders();
            setInterval(checkReminders, 60000);
        });
    </script>
